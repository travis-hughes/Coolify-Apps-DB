services:
  homarr:
    image: 'ghcr.io/ajnart/homarr:latest'
    environment:
      - SERVICE_FQDN_HOMARR_7575
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - 'homarr-configs:/app/data/configs'
      - 'homarr-icons:/app/public/icons'
      - 'homarr-data:/data'
    healthcheck:
      test:
        - CMD
        - wget
        - '-q'
        - '--spider'
        - 'http://127.0.0.1:7575'
      interval: 5s
      timeout: 20s
      retries: 10

volumes:
  homarr-configs:
    name: "homarr-configs"
  homarr-icons:
    name: "homarr-icons"
  homarr-data:
    name: "homarr-data"