services:
  mysql:
    hostname: onlyoffice-mysql-server
    image: mysql:8.0.29
    environment:
      - MYSQL_ROOT_PASSWORD=${SERVICE_PASSWORD_MYSQLROOT}
      - MYSQL_USER=${SERVICE_USER_MYSQL}
      - MYSQL_PASSWORD=${SERVICE_PASSWORD_MYSQL}
    stdin_open: true
    expose:
      - 3306
    tty: true
    restart: always
    volumes:
      - mysql-data:/var/lib/mysql

  community-server:
    hostname: onlyoffice-community-server
    image: onlyoffice/communityserver:12.6.0.1900
    environment:
      - SERVICE_FQDN_COMMUNITYSERVER_80
      - ONLYOFFICE_CORE_MACHINEKEY=$SERVICE_BASE64_COREKEY
      - CONTROL_PANEL_PORT_80_TCP=80
      - CONTROL_PANEL_PORT_80_TCP_ADDR=onlyoffice-control-panel
      - DOCUMENT_SERVER_PORT_80_TCP_ADDR=onlyoffice-document-server
      - DOCUMENT_SERVER_JWT_ENABLED=true
      - DOCUMENT_SERVER_JWT_SECRET=$SERVICE_BASE64_DOCUMENTSERVER
      - DOCUMENT_SERVER_JWT_HEADER=AuthorizationJwt
      - MYSQL_SERVER_ROOT_PASSWORD=${SERVICE_PASSWORD_MYSQLROOT}
      - MYSQL_SERVER_DB_NAME=onlyoffice
      - MYSQL_SERVER_HOST=onlyoffice-mysql-server
      - MYSQL_SERVER_USER=${SERVICE_USER_MYSQL}
      - MYSQL_SERVER_PASS=${SERVICE_PASSWORD_MYSQL}
      # - MAIL_SERVER_API_PORT=8081
      # - MAIL_SERVER_API_HOST=onlyoffice-mail-server
      # - MAIL_SERVER_DB_HOST=onlyoffice-mysql-server
      # - MAIL_SERVER_DB_PORT=3306
      # - MAIL_SERVER_DB_NAME=onlyoffice_mailserver
      # - MAIL_SERVER_DB_USER=${SERVICE_USER_MYSQL}
      # - MAIL_SERVER_DB_PASS=${SERVICE_PASSWORD_MYSQL}
      - ELASTICSEARCH_SERVER_HOST=onlyoffice-elasticsearch
      - ELASTICSEARCH_SERVER_HTTPPORT=9200
    ports:
      - '5222:5222'
    expose:
      - '80'
      - '443'
    stdin_open: true
    tty: true
    restart: always
    privileged: true
    cgroup: host
    volumes:
      - community-data:/var/www/onlyoffice/Data
      - community-letsencrypt:/etc/letsencrypt
      - document-data:/var/www/onlyoffice/DocumentServerData
      - community-certs:/var/www/onlyoffice/Data/certs
      - /var/log/onlyoffice:/var/log/onlyoffice:rw
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

  document-server:
    hostname: onlyoffice-document-server
    image: onlyoffice/documentserver:8.1
    stdin_open: true
    tty: true
    restart: always
    environment:
      - SERVICE_FQDN_DOCUMENTSERVER_80
      - JWT_ENABLED=true
      - JWT_SECRET=$SERVICE_BASE64_DOCUMENTSERVER
      - JWT_HEADER=AuthorizationJwt
    expose:
      - '80'
      - '443'
    volumes:
      - document-data:/var/www/onlyoffice/Data
      - document-forgotten:/var/lib/onlyoffice/documentserver/App_Data/cache/files/forgotten
      - /var/log/onlyoffice:/var/log/onlyoffice:rw
      - /Appbox-Data/Media/Fonts:/usr/share/fonts/truetype/custom

  elasticsearch:
    hostname: onlyoffice-elasticsearch
    image: onlyoffice/elasticsearch:7.16.3
    restart: always
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g -Dlog4j2.formatMsgNoLookups=true"
      - "indices.fielddata.cache.size=30%"
      - "indices.memory.index_buffer_size=30%" 
      - "ingest.geoip.downloader.enabled=false"  
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - es-data:/usr/share/elasticsearch/data
    expose:
      - "9200"
      - "9300"

  control-panel:
    hostname: onlyoffice-control-panel
    image: onlyoffice/controlpanel:3.5.2.530
    environment:
      - ONLYOFFICE_CORE_MACHINEKEY=$SERVICE_BASE64_COREKEY
    expose:
      - '80'
      - '443'
    restart: always
    volumes:
      - controlpanel-data:/var/www/onlyoffice/Data
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log/onlyoffice:/var/log/onlyoffice
    stdin_open: true
    tty: true

volumes:
  community-data:
    name: "onlyoffice-community-data"
  community-letsencrypt:
    name: "onlyoffice-community-letsencrypt"
  community-certs:
    name: "onlyoffice-community-certs"
  controlpanel-data:
    name: "onlyoffice-controlpanel-data"
  mysql-data:
    name: "onlyoffice-mysql-server"
  es-data:
    name: "onlyoffice-es-data"
  document-data:
    name: "onlyoffice-document-data"
  document-forgotten:
    name: "onlyoffice-document-forgotten"