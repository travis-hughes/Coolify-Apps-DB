services:
  homarr:
    image: ghcr.io/ajnart/homarr:latest
    environment:
      - SERVICE_FQDN_HOMARR_7575
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - configs:/app/data/configs
      - icons:/app/public/icons
      - data:/data

volumes:
  configs:
    name: "homarr-configs"
  icons:
    name: "homarr-icons"
  data:
    name: "homarr-data"