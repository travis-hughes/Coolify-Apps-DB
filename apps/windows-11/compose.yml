services:
  windows:
    image: dockurr/windows:5.14
    restart: unless-stopped
    stop_grace_period: 2m
    networks:
      - public
    environment:
      VERSION: 11
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    expose:
      - 8006
      - 3389
    volumes:
      - windows:/storage


volumes:
  windows:
    name: windows-11
    external: false


networks:
  public:
    name: public
    external: true