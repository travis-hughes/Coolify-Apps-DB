services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    restart: unless-stopped
    networks:
      - public
    environment:
      - PUID={{environment.USER_ID}}
      - PGID={{environment.GROUP_ID}}
      - TZ={{environment.TZ}}
      - PASSWORD=${PASSWORD}
      - HASHED_PASSWORD=
      - SUDO_PASSWORD=${SUDO_PASSWORD}
      # - SUDO_PASSWORD_HASH=
      # - PROXY_DOMAIN=${COMPOSE_PROJECT_NAME}.${DOMAIN_NAME}
      - DEFAULT_WORKSPACE=/config/workspace
      - PWA_APPNAME=code-server
    volumes:
      - vscode-server:/config


volumes:
  config:
    name: vscode-server
    external: false


networks:
  public:
    name: public
    external: true